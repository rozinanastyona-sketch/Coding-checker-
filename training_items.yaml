  utterance: DOG IS EAT -ING CORN
  rationale: IS is an auxiliary here, so it is a non-lexical verb AND there is a lexical main verb (EAT).
    Singular DOG + IS agree. USV = subject + lexical verb only; ignore the rest.
  ref: SV / Lexical vs Non-lexical; USV coding; SV Agreement
  answer:
