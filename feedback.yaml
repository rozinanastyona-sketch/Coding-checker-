# Student-facing feedback text.
#
# Edit the wording here freely - checker_engine.py does not hard-code any of it.
#
# Placeholders available in every template:
#   {utterance}   the transcript, e.g. I WASH CORN EGG
#   {key}         what the key has          e.g. Non-imitative   /  0.5  /  Noun, Pronoun, Verb
#   {found}       what the student coded    e.g. Imitative       /  0.0  /  Noun, Verb
#   {missing}     values in the key but not the student's  e.g. Pronoun
#   {extra}       values the student added but the key does not have
#
# Each category has up to three templates:
#   wrong_value    - the student picked the wrong behavior (Listing Present vs Not Present, ...)
#   missing_mods   - the student left out one or more modifiers
#   extra_mods     - the student added modifiers the key does not have
#   missing_row    - the student did not code this category at all
# If a template is absent, the generic fallback at the bottom is used.

categories:

  Communicative Intent:
    wrong_value: >-
      Communicative Intent - key: {key}, you coded: {found}. The utterance here is
      "{utterance}". Code CI to show whether the child selected the symbols with an
      intention to communicate something to someone, rather than selecting random symbols.
    missing_row: >-
      Communicative Intent is not coded for this utterance. Every utterance must be coded
      for CI. The utterance here is "{utterance}".

  Listing:
    wrong_value: >-
      Listing - key: {key}, you coded: {found}. Listing is present when the child provides
      3 or more symbols of the same part of speech. When Listing is present, code only
      Number of Symbols, Number of Relevant Symbols, and Parts of Speech - nothing else.

  Imitative:
    wrong_value: >-
      Imitativeness - key: {key}, you coded: {found}. Please rewatch the video and review
      the operational definitions to see why. Remember: imitativeness is judged on what
      happened BEFORE the utterance began - whether the child's production contains at
      least one novel symbol compared with the examiner's immediately prior spoken or
      aided utterance.

  Independent Aided Utterances:
    wrong_value: >-
      Independence - key: {key}, you coded: {found}. Please rewatch the video and review
      the operational definitions to see why. Remember: this is judged on what happens
      AFTER the utterance has begun - whether the examiner prompted the child to add
      symbols. If symbols are added following the examiner's prompt, the completed
      utterance is a co-construction.

  Number of Symbols:
    # Normally no explanation is needed - just the correct count. The exception is
    # when the utterance itself was transcribed wrongly: then the count follows
    # from the transcript, and the student should be pointed at that.
    missing_mods: "Number of Symbols - key: {key}, you coded: {found}."
    extra_mods: "Number of Symbols - key: {key}, you coded: {found}."
    missing_mods_transcript_differs: >-
      Number of Symbols - key: {key}, you coded: {found}. The utterance is not what you
      transcribed, so the count follows from the corrected transcript.
    extra_mods_transcript_differs: >-
      Number of Symbols - key: {key}, you coded: {found}. The utterance is not what you
      transcribed, so the count follows from the corrected transcript.

  Number of Relevant Symbols:
    missing_mods: >-
      Number of Relevant Symbols - key: {key}, you coded: {found}. Put irrelevant symbols
      in square brackets, e.g. WASH [CORN] EGG.
    extra_mods: >-
      Number of Relevant Symbols - key: {key}, you coded: {found}. Put irrelevant symbols
      in square brackets, e.g. WASH [CORN] EGG.

  Word Order:
    # Deliberately minimal: a useful explanation depends on which symbols are in the
    # right order, which cannot be derived mechanically. Give the score only.
    missing_mods: "Word Order - key: {key}, you coded: {found}."
    extra_mods: "Word Order - key: {key}, you coded: {found}."

  SV:
    wrong_value: "SV - key: {key}, you coded: {found}."
    missing_mods: >-
      SV - key: {key}, you coded: {found}.
    extra_mods: >-
      SV - key: {key}, you coded: {found}.

  Parts of Speech:
    missing_mods: >-
      Parts of Speech - you did not mark: {missing}. Select every part of speech present
      in the utterance "{utterance}". Code parts of speech using relevant symbols only.
    extra_mods: >-
      Parts of Speech - {extra} does not apply to "{utterance}". Code parts of speech
      using relevant symbols only.
    wrong_value: >-
      Parts of Speech - key: {key}, you coded: {found}.

  Inflectional Morphemes:
    wrong_value: >-
      Inflectional Morphemes - key: {key}, you coded: {found}. Only -S and -ING that are
      used appropriately count. An irrelevant morpheme is not counted.

  Grammatical Intent:
    # Same reasoning as Word Order: give the answer, let the student work out why.
    wrong_value: "Grammatical Intent - key: {key}, you coded: {found}."

# Long behavior names are shortened when they appear inside a comment, so the text
# stays readable. Only affects the wording of comments, never the coding itself.
value_labels:
  "No appropriate inflectional morphemes": "none"
  "At least one appropriate inflectional morpheme": "at least one"
  "Parts of speech Absent (no relev. symbols or infl. morph.only)": "absent"
  "Parts of Speech Present": "present"
  "Listing Not Present": "not present"
  "Listing is Present": "present"
  "Communicative Intent Present": "present"
  "Communicative Intent Absent": "absent"
  "Grammatical Intent Clear": "clear"
  "Grammatical Intent NOT Clear/No Grammar": "not clear"
  "Independent Utterance": "independent"
  "Co-constructed Utterance": "co-constructed"

# Modifiers that only apply under a specific condition. If the student uses one where
# the key does not, this explanation is given instead of the category's extra_mods text.
conditional_modifiers:
  "Subject-Verb Agreement (is, am, are) Present":
    explanation: >-
      Subject-Verb Agreement applies only to utterances that contain a 'to be' verb
      (IS, AM, ARE). "{utterance}" does not contain one, so this modifier should not be
      used - neither "present" nor "absent".
  "Subject-Verb Agreement (is, am, are) Absent":
    explanation: >-
      Subject-Verb Agreement applies only to utterances that contain a 'to be' verb
      (IS, AM, ARE). "{utterance}" does not contain one, so this modifier should not be
      used - neither "present" nor "absent".

# Issues that are not tied to one coding category.
other:
  usv_missing_note: >-
    SV is a unique subject-verb combination, but the USV is not written out. Transcribe
    it in the Comment section: "USV: SUBJECT VERB".
  transcript_mismatch: >-
    Transcript - the key has "{key}". Check the video again: the codes below depend on
    getting the utterance itself right.
  missing_utterance: >-
    Missing utterance - the key has "{key}" here, which you did not code.
  extra_code: >-
    {found} is not coded for this utterance in the key. Check the operational definitions
    for which categories apply here - for example, when Listing is present, only Number of
    Symbols, Number of Relevant Symbols, and Parts of Speech are coded.
  extra_utterance: >-
    This utterance is not in the key. Please review the operational definitions on
    utterance boundaries and check whether it should have been coded at all.
  boundary_unclear: >-
    The boundaries of this utterance could not be determined confidently. Please check it
    by hand.

# Automatic reminders appended to a category's comment only when the utterance matches a
# specific, mechanically-detectable pattern from the operational definitions. Everything
# else in Word Order / Grammatical Intent is still left to the manual reviewer.
reminders:
  # Word Order: appended when the key utterance is exactly two symbols of the same part of
  # speech (e.g. two nouns, two verbs, two adjectives) and the student's score differs.
  word_order_two_same_pos: >-
    This utterance is two symbols of the same part of speech. Per the operational
    definitions: "If the child provides 2 nouns/pronouns, verbs, prepositions or adjectives
    by themselves, score this as a 1." So the Word Order score here should be 1.0.
  # Grammatical Intent: appended when the key utterance is a single-symbol utterance.
  grammatical_intent_single_symbol: >-
    This is a single-symbol utterance. Per the operational definitions, single symbol
    utterances are coded as Grammatical Intent NOT clear / No Grammar.
  # Grammatical Intent: appended to every Grammatical Intent comment.
  grammatical_intent_context: >-
    Remember: grammatical intent must be judged from context - the same utterance can have
    clear grammatical intent in one instance and not clear in another, depending on the context.

# Used when a category above has no template for the situation.
fallback:
  wrong_value: "{category} - key: {key}, you coded: {found}."
  missing_mods: "{category} - key: {key}, you coded: {found}."
  extra_mods: "{category} - key: {key}, you coded: {found}."
  missing_row: "{category} is not coded for this utterance. Key: {key}."
